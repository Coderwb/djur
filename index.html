<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utforska ALLA Världens Djur</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef5ed;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; color: #1e4620; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        
        /* Filter och navigering */
        .Kategorier {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .kat-knapp {
            padding: 12px 20px;
            border: none;
            background-color: #27ae60;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .kat-knapp:hover, .kat-knapp.aktiv {
            background-color: #1e6b3c;
            transform: translateY(-2px);
        }

        /* Djur-rutnät */
        .djur-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .djur-kort {
            background: #fdfdfd;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .djur-kort:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }
        .djur-bild {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #eaeaea;
            margin-bottom: 10px;
        }
        .vetenskapligt-namn {
            font-style: italic;
            color: #7f8c8d;
            font-size: 0.9em;
        }
        .laddar {
            text-align: center;
            font-size: 1.2em;
            grid-column: 1 / -1;
            padding: 40px;
            color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌍 ALLA Världens Djurarter 🦁</h1>
        <p class="subtitle">Hämtar data live från globala forskardatabaser (GBIF)</p>
        
        <!-- Knappar för att välja djurgrupp -->
        <div class="Kategorier">
            <button class="kat-knapp aktiv" onclick="bytaKategori('Mammalia', this)">Däggdjur</button>
            <button class="kat-knapp" onclick="bytaKategori('Aves', this)">Fåglar</button>
            <button class="kat-knapp" onclick="bytaKategori('Actinopterygii', this)">Fiskar</button>
            <button class="kat-knapp" onclick="bytaKategori('Insecta', this)">Insekter</button>
            <button class="kat-knapp" onclick="bytaKategori('Reptilia', this)">Reptiler</button>
        </div>

        <!-- Här visas alla djur -->
        <div class="djur-grid" id="djurLista">
            <div class="laddar">Laddar in djurvärlden...</div>
        </div>
    </div>

    <script>
        // Djurrikets ID i GBIF-databasen är 1
        const ANIMALIA_ID = 1; 

        async function hamtaDjur(klassNamn) {
            const listaDiv = document.getElementById('djurLista');
            listaDiv.innerHTML = '<div class="laddar">Hämtar djurarter från databasen...</div>';

            try {
                // 1. Hitta ID för den valda djurklassen (t.ex. Däggdjur)
                const klassUrl = `https://gbif.org{klassNamn}`;
                const klassSvar = await fetch(klassUrl);
                const klassData = await klassSvar.json();
                const klassKey = klassData.classKey;

                // 2. Hämta de nu levande arterna i den klassen som har bilder
                const artUrl = `https://gbif.org{klassKey}&mediaType=StillImage&limit=20&status=ACCEPTED`;
                const artSvar = await fetch(artUrl);
                const artData = await artSvar.json();

                listaDiv.innerHTML = ''; // Rensa laddningstexten

                // Håll koll på unika arter så vi inte visar samma djur två gånger
                const visadeArter = new Set();

                artData.results.forEach(observation => {
                    const namn = observation.species || observation.scientificName;
                    
                    // Kontrollera att arten har ett namn, en bild och inte redan visas
                    if (namn && observation.media && observation.media[0] && !visadeArter.has(namn)) {
                        visadeArter.add(namn);
                        
                        const bildUrl = observation.media[0].identifier;
                        const land = observation.country || "Okänt område";

                        // Skapa kortet för djuret
                        const kort = document.createElement('div');
                        kort.className = 'djur-kort';
                        kort.innerHTML = `
                            <img class="djur-bild" src="${bildUrl}" alt="${namn}" onerror="this.src='https://placehold.co'">
                            <h3>${namn}</h3>
                            <p class="vetenskapligt-namn">Lever i: ${land}</p>
                            <p style="font-size: 0.85em; color: #555;"><b>Status:</b> Vildlevande art</p>
                        `;
                        listaDiv.appendChild(kort);
                    }
                });

                if(listaDiv.children.length === 0) {
                    listaDiv.innerHTML = '<p>Kunde inte ladda bilder just nu. Försök igen.</p>';
                }

            } catch (fel) {
                console.error(fel);
                listaDiv.innerHTML = '<p style="color:red; grid-column: 1/-1;">Ett fel uppstod när djuren skulle hämtas.</p>';
            }
        }

        function bytaKategori(klassNamn, knappElement) {
            // Uppdatera vilken knapp som ser aktiv ut
            document.querySelectorAll('.kat-knapp').forEach(btn => btn.classList.remove('aktiv'));
            knappElement.classList.add('aktiv');
            
            // Hämta djuren för den valda kategorin
            hamtaDjur(klassNamn);
        }

        // Starta hemsidan med att ladda Däggdjur automatiskt
        window.onload = () => hamtaDjur('Mammalia');
    </script>

</body>
</html>
