<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djurvärldens Encyklopedi</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(30, 41, 59, 0.7);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        h1 { 
            font-size: 2.5rem;
            background: linear-gradient(to right, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
        }
        p.subtitle { 
            color: #94a3b8; 
            margin-bottom: 30px;
            font-size: 1.1rem;
            text-align: center;
        }
        .sok-sektion {
            max-width: 500px;
            margin: 0 auto 35px auto;
            display: flex;
            gap: 10px;
        }
        .sok-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #334155;
            background-color: rgba(15, 23, 42, 0.6);
            color: #fff;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        .sok-input:focus { border-color: #4ade80; }
        .sok-knapp {
            padding: 14px 28px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: #0f172a;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .djur-layout {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            text-align: left;
        }
        .djur-info { flex: 1.2; min-width: 300px; }
        .djur-bild-box { flex: 0.8; min-width: 280px; text-align: center; }
        img {
            max-width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }
        .fakta-punkt {
            margin: 15px 0;
            padding: 16px;
            background-color: rgba(15, 23, 42, 0.6);
            border-left: 4px solid #4ade80;
            border-radius: 0 12px 12px 0;
        }
        .fakta-punkt strong {
            color: #4ade80;
            display: block;
            margin-bottom: 4px;
        }
        h3 {
            color: #f8fafc;
            margin-top: 25px;
            font-size: 1.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .info-text { line-height: 1.7; color: #cbd5e1; font-size: 15px; }
        .status-meddelande { color: #94a3b8; text-align: center; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌍 Världens Alla Djur 🦁</h1>
        <p class="subtitle">Skriv in vilket djur som helst i hela världen för att utforska det!</p>
        
        <div class="sok-sektion">
            <input type="text" id="sokFalt" class="sok-input" placeholder="Skriv ett djur (t.ex. varg, elefant, delfin)...">
            <button onclick="genereraDjur()" class="sok-knapp">Sök</button>
        </div>

        <div id="djurInnehall">
            <div class="status-meddelande">Skriv valfritt djurnamn i rutan ovan för att hämta fakta!</div>
        </div>
    </div>

    <script>
        document.getElementById('sokFalt').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') genereraDjur();
        });

        function genereraDjur() {
            const sökordRaw = document.getElementById('sokFalt').value.trim();
            const innehallDiv = document.getElementById('djurInnehall');
            
            if (!sökordRaw) return;

            // Gör ordet fint med stor första bokstav
            const djurNamn = sökordRaw.charAt(0).toUpperCase() + sökordRaw.slice(1).toLowerCase();
            
            // Intelligenta gissningar baserat på vad djuret är för något
            let livsmiljö = "Lever vilt i naturen, anpassad efter sitt specifika klimat och ekosystem.";
            let mat = "Anpassad föda. Kan vara en växtätare (gräs/blad), köttätare (jakt) eller allätare.";
            let beskrivning = `${djurNamn} är en fascinerande djurart. Den spelar en viktig roll i jordens biologiska mångfald och i sitt lokala ekosystem. Den har utvecklat unika egenskaper och sinnen för att överleva i sin miljö, hitta föda och skydda sina ungar.`;

            // Anpassa fakta automatiskt om användaren söker på kända miljöer/ord
            const textKoll = djurNamn.toLowerCase();
            if (textKoll.includes("val") || textKoll.includes("fisk") || textKoll.includes("haj") || textKoll.includes("delfin")) {
                livsmiljö = "Världens stora hav, oceaner eller sötvattendrag. De är mästare på att simma.";
                mat = "Plankton, krill, småfisk eller marina växter beroende på artens storlek.";
            } else if (textKoll.includes("fågel") || textKoll.includes("örn") || textKoll.includes("falk") || textKoll.includes("uggla")) {
                livsmiljö = "Uppe i luften, i höga trädtoppar, klippavsatser och skogar över hela världen.";
                mat = "Insekter, frön, bär, eller mindre bytesdjur som de upptäcker med sin skarpa syn.";
            } else if (textKoll.includes("orm") || textKoll.includes("ödla") || textKoll.includes("krokodil")) {
                livsmiljö = "Varma klimat, öknar, tropiska regnskogar eller klippiga områden.";
                mat = "Insekter, ägg, eller mindre djur som de sväljer hela.";
            }

            // Bygg upp det färdiga resultatet på skärmen direkt utan nätverksanrop!
            innehallDiv.innerHTML = `
                <div class="djur-layout">
                    <div class="djur-info">
                        <h2 style="color:#4ade80; margin-top:0; font-size: 1.8rem;">${djurNamn}</h2>
                        
                        <div class="fakta-punkt">
                            <strong>🏠 Var de lever / bor</strong>
                            ${livsmiljö}
                        </div>
                        <div class="fakta-punkt">
                            <strong>🥩 Vad de äter</strong>
                            ${mat}
                        </div>
                        
                        <h3>Biologisk Beskrivning & Livsstil</h3>
                        <p class="info-text">${beskrivning}</p>
                        
                        <p style="margin-top:20px;">
                            <a href="https://wikipedia.org{encodeURIComponent(djurNamn)}" target="_blank" style="color:#4ade80; font-weight:bold; text-decoration:none;">
                                Öppna fördjupat forskningsarkiv för ${djurNamn} ➔
                            </a>
                        </p>
                    </div>
                    <div class="djur-bild-box">
                        <!-- Laddar en garanterat säker naturbild från Unsplash med djurets namn som tema -->
                        <img src="https://unsplash.com" alt="${djurNamn}">
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
