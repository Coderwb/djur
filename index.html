<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Världens Alla Djur</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f7f4;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
        }
        h1 { color: #1e4620; margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; }
        
        /* Meny med djurknappar */
        .kategorier {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .kat-knapp {
            padding: 12px 20px;
            border: none;
            background-color: #2e7d32;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.2s;
        }
        .kat-knapp:hover, .kat-knapp.aktiv {
            background-color: #1b5e20;
            transform: translateY(-2px);
        }

        /* Layout för djurvisning */
        .djur-layout {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            text-align: left;
            border-top: 2px solid #f0f7f4;
            padding-top: 20px;
        }
        .djur-info { flex: 1; min-width: 300px; }
        .djur-bild-box { flex: 1; min-width: 300px; text-align: center; }
        
        img {
            max-width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .fakta-punkt {
            margin: 8px 0;
            padding: 6px 12px;
            background-color: #f4f9f4;
            border-left: 4px solid #2e7d32;
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌍 Utforska Världens Djur 🦁</h1>
        <p class="subtitle">Klicka på ett djur för att se var de bor, vad de äter och hur de lever!</p>
        
        <!-- Knappar för att välja djur -->
        <div class="kategorier" id="knappYta"></div>

        <!-- Här visas djuret som valts -->
        <div id="djurInnehall"></div>
    </div>

    <script>
        // Inbyggd databas med all fakta och säkra Unsplash-bilder
        const djurDatabas = {
            blåval: {
                namn: "Blåval 🐋",
                bor: "Alla världens stora hav, men vandrar mot polerna på sommaren.",
                ater: "Enormt stora mängder krill (små kräftdjur).",
                fakta: "Blåvalen är det absolut största djuret som någonsin har levt på jorden. Bara dess tunga kan väga lika mycket som en hel elefant!",
                bild: "https://unsplash.com"
            },
            lejon: {
                namn: "Lejon 🦁",
                bor: "Subsahariska Afrika samt i en liten skyddad skog i Indien.",
                ater: "Kött (zebror, gnuantiloper och andra gräsätare).",
                fakta: "Lejon lever i flockar, till skillnad från de flesta andra kattdjur. Det är oftast honoma (lejoninnorna) som jagar tillsammans.",
                bild: "https://unsplash.com"
            },
            schimpans: {
                namn: "Schimpans 🐒",
                bor: "Tropiska regnskogar och fuktiga savanner i Central- och Västafrika.",
                ater: "Frukt, blad, frön, insekter och ibland mindre djur.",
                fakta: "Schimpanser är otroligt smarta och använder verktyg, som pinnar för att fiska efter termiter eller stenar för att knäcka nötter.",
                bild: "https://unsplash.com"
            },
            albatross: {
                namn: "Albatross 🦅",
                bor: "Södra oceanen och norra Stilla havet, mestadels uppe i luften över öppet hav.",
                ater: "Fisk, bläckfisk och krill som de fångar vid havsytan.",
                fakta: "De har världens största vingspann (upp till 3,5 meter). De kan flyga tusentals mil utan att slå med vingarna en enda gång!",
                bild: "https://unsplash.com"
            },
            guldfisk: {
                namn: "Guldfisk 🐠",
                bor: "Ursprungligen från sötvatten i Östasien, nu i akvarier och dammar över hela världen.",
                ater: "Alger, växter, små insekter och färdigt fiskfoder.",
                fakta: "Det är en myt att guldfiskar bara har tre sekunders minne. Forskning visar att de kan komma ihåg saker i flera månader!",
                bild: "https://unsplash.com"
            }
        };

        // Funktion för att rita upp knapparna automatiskt
        function skapaMeny() {
            const knappYta = document.getElementById('knappYta');
            let forstaDjur = true;

            for (const nyckel in djurDatabas) {
                const djur = djurDatabas[nyckel];
                const knapp = document.createElement('button');
                knapp.className = 'kat-knapp' + (forstaDjur ? ' aktiv' : '');
                knapp.innerText = djur.namn;
                knapp.onclick = (e) => visaDjur(nyckel, e.target);
                knappYta.appendChild(knapp);
                
                if (forstaDjur) {
                    visaDjur(nyckel);
                    forstaDjur = false;
                }
            }
        }

        // Funktion för att visa valt djurs fakta
        function visaDjur(id, knappElement) {
            if (knappElement) {
                document.querySelectorAll('.kat-knapp').forEach(btn => btn.classList.remove('aktiv'));
                knappElement.classList.add('aktiv');
            }

            const djur = djurDatabas[id];
            const innehallDiv = document.getElementById('djurInnehall');

            innehallDiv.innerHTML = `
                <div class="djur-layout">
                    <div class="djur-info">
                        <h2 style="color:#2e7d32; margin-top:0;">${djur.namn}</h2>
                        
                        <div class="fakta-punkt"><b>🌍 Var de lever/bor:</b> ${djur.bor}</div>
                        <div class="fakta-punkt"><b>🥩 Vad de äter:</b> ${djur.ater}</div>
                        
                        <h3 style="margin-top:20px; color:#1e4620;">Hur de lever & Livsstil</h3>
                        <p style="line-height: 1.6; font-size: 15px;">${djur.fakta}</p>
                    </div>
                    <div class="djur-bild-box">
                        <img src="${djur.bild}" alt="${djur.namn}">
                    </div>
                </div>
            `;
        }

        // Kör igång programmet direkt när sidan laddas
        window.onload = skapaMeny;
    </script>

</body>
</html>
