<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Världens Alla Djur</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f7f4;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
        }
        h1 { color: #1e4620; margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; }
        
        /* Flikar och Kategorier */
        .kategorier {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .kat-knapp {
            padding: 12px 20px;
            border: none;
            background-color: #2e7d32;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.2s;
        }
        .kat-knapp:hover, .kat-knapp.aktiv {
            background-color: #1b5e20;
            transform: translateY(-2px);
        }

        /* Visning av valt djur */
        #djurInnehall {
            margin-top: 20px;
            text-align: left;
            border-top: 2px solid #f0f7f4;
            padding-top: 20px;
        }
        .djur-layout {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .djur-info { flex: 1; min-width: 300px; }
        .djur-bild-box { flex: 1; min-width: 300px; text-align: center; }
        
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .laddar {
            font-size: 18px;
            color: #7f8c8d;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌍 Världens Alla Djurgrupper 🦁</h1>
        <p class="subtitle">Klicka på en kategori för att utforska och lära dig om djuren på svenska</p>
        
        <!-- Knappar för olika djur -->
        <div class="kategorier">
            <button class="kat-knapp aktiv" onclick="visaDjur('Blåval', this)">🐋 Blåval</button>
            <button class="kat-knapp" onclick="visaDjur('Lejon', this)">🦁 Lejon</button>
            <button class="kat-knapp" onclick="visaDjur('Schimpans', this)">🐒 Schimpans</button>
            <button class="kat-knapp" onclick="visaDjur('Vandringsalkatraz', this)">🦅 Albatross</button>
            <button class="kat-knapp" onclick="visaDjur('Guldfisk', this)">🐠 Guldfisk</button>
            <button class="kat-knapp" onclick="visaDjur('Fästingar', this)">🕷️ Fästing</button>
        </div>

        <!-- Här laddas djurinfon in automatiskt -->
        <div id="djurInnehall">
            <div class="laddar">Laddar djurvärlden...</div>
        </div>
    </div>

    <script>
        async function visaDjur(djurNamn, knappElement) {
            const innehallDiv = document.getElementById('djurInnehall');
            innehallDiv.innerHTML = '<div class="laddar">Hämtar spännande fakta från databasen...</div>';

            // Hantera vilken knapp som lyser grönt
            if (knappElement) {
                document.querySelectorAll('.kat-knapp').forEach(btn => btn.classList.remove('aktiv'));
                knappElement.classList.add('aktiv');
            }

            try {
                // Hämtar direkt från svenska Wikipedia på ett säkert sätt
                const url = `https://wikipedia.org{encodeURIComponent(djurNamn)}`;
                const svar = await fetch(url);
                
                if (!svar.ok) throw new Error('Kunde inte läsa data.');
                const data = await svar.json();

                // Skapar ett snyggt kort med text till vänster och bild till höger
                innehallDiv.innerHTML = `
                    <div class="djur-layout">
                        <div class="djur-info">
                            <h2 style="color:#2e7d32; margin-top:0;">${data.title}</h2>
                            <p style="line-height: 1.7; font-size: 16px;">${data.extract}</p>
                            <p style="margin-top:20px;">
                                <a href="${data.content_urls.desktop.page}" target="_blank" style="color:#2e7d32; font-weight:bold; text-decoration:none;">
                                    Läs hela forskningsartikeln här ➔
                                </a>
                            </p>
                        </div>
                        <div class="djur-bild-box">
                            ${data.thumbnail ? `<img src="${data.thumbnail.source}" alt="${data.title}">` : '<p>Bild saknas för detta djur.</p>'}
                        </div>
                    </div>
                `;

            } catch (fel) {
                innehallDiv.innerHTML = '<p style="color:red; padding:20px;">Kunde inte ladda djuret just nu. Testa en annan flik.</p>';
            }
        }

        // Starta med att visa blåvalen direkt när hemsidan öppnas
        window.onload = () => {
            const forstaKnapp = document.querySelector('.kat-knapp');
            visaDjur('Blåval', forstaKnapp);
        };
    </script>

</body>
</html>
