<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djurvärldens Encyklopedi</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(30, 41, 59, 0.7);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        h1 { 
            font-size: 2.5rem;
            background: linear-gradient(to right, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
            text-align: center;
        }
        p.subtitle { 
            color: #94a3b8; 
            margin-bottom: 30px;
            font-size: 1.1rem;
            text-align: center;
        }

        /* Sökfält */
        .sok-sektion {
            max-width: 500px;
            margin: 0 auto 35px auto;
            display: flex;
            gap: 10px;
        }
        .sok-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #334155;
            background-color: rgba(15, 23, 42, 0.6);
            color: #fff;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        .sok-input:focus {
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.2);
        }
        .sok-knapp {
            padding: 14px 28px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: #0f172a;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
        }
        .sok-knapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(34, 197, 94, 0.5);
        }
        
        /* Snabbknappar */
        .kategorier {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
        .kat-knapp {
            padding: 10px 18px;
            border: 1px solid rgba(74, 222, 128, 0.4);
            background-color: transparent;
            color: #94a3b8;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .kat-knapp:hover, .kat-knapp.aktiv {
            color: #4ade80;
            border-color: #4ade80;
            background-color: rgba(34, 197, 94, 0.1);
        }

        /* Layout för djurvisning */
        .djur-layout {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            text-align: left;
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .djur-info { flex: 1.2; min-width: 300px; }
        .djur-bild-box { flex: 0.8; min-width: 280px; text-align: center; }
        
        img {
            max-width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }

        /* Fakta-kort */
        .fakta-punkt {
            margin: 15px 0;
            padding: 16px;
            background-color: rgba(15, 23, 42, 0.6);
            border-left: 4px solid #4ade80;
            border-radius: 0 12px 12px 0;
        }
        .fakta-punkt strong {
            color: #4ade80;
            display: block;
            margin-bottom: 4px;
            font-size: 0.95rem;
            text-transform: uppercase;
        }
        h3 {
            color: #f8fafc;
            margin-top: 25px;
            font-size: 1.3rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .info-text { line-height: 1.7; color: #cbd5e1; font-size: 15px; }
        .status-meddelande { color: #94a3b8; text-align: center; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌍 Djurvärldens Encyklopedi 🦁</h1>
        <p class="subtitle">Sök fritt bland ALLA världens djur helt på svenska!</p>
        
        <!-- SÖKFÄLT -->
        <div class="sok-sektion">
            <input type="text" id="sokFalt" class="sok-input" placeholder="Skriv valfritt djur (t.ex. Varg, Elefant, Orm)...">
            <button onclick="sökFrittDjur()" class="sok-knapp">Sök</button>
        </div>

        <!-- Snabbval -->
        <div class="kategorier" id="knappYta">
            <button class="kat-knapp aktiv" onclick="visaInbyggtDjur('blåval', this)">🐋 Blåval</button>
            <button class="kat-knapp" onclick="visaInbyggtDjur('lejon', this)">🦁 Lejon</button>
            <button class="kat-knapp" onclick="visaInbyggtDjur('schimpans', this)">🐒 Schimpans</button>
        </div>

        <!-- Här visas resultatet -->
        <div id="djurInnehall"></div>
    </div>

    <script>
        // Inbyggda favoriter för snabbstart
        const djurDatabas = {
            blåval: {
                namn: "Blåval 🐋",
                bor: "Vandrar genom alla jordens stora världshav.",
                ater: "Äter upp till 4 ton krill (små kräftdjur) varje dag.",
                fakta: "Blåvalen är jordens största levande varelse. Dess hjärta är lika stort som en liten bil, och dess sång kan höras hundratals mil under vattnet.",
                bild: "https://unsplash.com"
            },
            lejon: {
                namn: "Lejon 🦁",
                bor: "Afrikas savanner samt ett skyddat skogsområde i Indien.",
                ater: "Stora hovdjur som zebror, gnuantiloper och bufflar.",
                fakta: "Kallas för djurens konung. De lever i flockar (prides) styrt av lejoninnor, som också sköter den mesta av jakten under natten.",
                bild: "https://unsplash.com"
            },
            schimpans: {
                namn: "Schimpans 🐒",
                bor: "Centralafrikas täta regnskogar och djungler.",
                ater: "Främst frukter, nötter och blad, men ibland även insekter.",
                fakta: "Delar över 98% av sitt DNA med människan. De är extremt intelligenta och kan tillverka egna verktyg för att få tag i mat.",
                bild: "https://unsplash.com"
            }
        };

        document.getElementById('sokFalt').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sökFrittDjur();
        });

        function visaInbyggtDjur(id, knappElement) {
            if (knappElement) {
                document.querySelectorAll('.kat-knapp').forEach(btn => btn.classList.remove('aktiv'));
                knappElement.classList.add('aktiv');
            }
            renderaDjurKort(djurDatabas[id]);
        }

        // DEN NYA SÄKRA SÖKFUNKTIONEN
        async function sökFrittDjur() {
            const sökordRaw = document.getElementById('sokFalt').value.trim();
            const innehallDiv = document.getElementById('djurInnehall');
            
            if (!sokordRaw) return;

            document.querySelectorAll('.kat-knapp').forEach(btn => btn.classList.remove('aktiv'));
            innehallDiv.innerHTML = '<div class="status-meddelande">Söker i världsregistret...</div>';

            // Gör första bokstaven stor
            const sökord = sökordRaw.charAt(0).toUpperCase() + sökordRaw.slice(1).toLowerCase();

            try {
                // ANVÄNDER ORIGIN=* FÖR ATT LÅSA UPP SÖKNINGEN HELT
                const wikiUrl = `https://wikipedia.org|pageimages&exintro&explaintext&titles=${encodeURIComponent(sökord)}&format=json&pithumbsize=500&origin=*`;
                
                const svar = await fetch(wikiUrl);
                const data = await svar.json();
                
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                
                // Om djuret inte hittas (-1 betyder tom träff i Wikipedia)
                if (pageId === "-1") {
                    innehallDiv.innerHTML = `<div class="status-meddelande" style="color:#ef4444;">Kunde inte hitta "${sökord}". Kontrollera stavningen eller testa ett annat djur!</div>`;
                    return;
                }

                const info = pages[pageId];
                
                // Skapa djurobjektet från Wikipedia-svaret
                const funnetDjur = {
                    namn: info.title,
                    bor: "Hela världen (se texten nedan för specifikt område).",
                    ater: "Anpassat efter dess naturliga miljö.",
                    fakta: info.extract || "Ingen beskrivning tillgänglig.",
                    bild: info.thumbnail ? info.thumbnail.source : "https://unsplash.com"
                };

                renderaDjurKort(funnetDjur, `https://wikipedia.org{pageId}`);

            } catch (fel) {
                innehallDiv.innerHTML = `<div class="status-meddelande" style="color:#ef4444;">Ett tekniskt fel uppstod. Kontrollera din internetanslutning.</div>`;
            }
        }

        function renderaDjurKort(djur, wikiLänk) {
            const innehallDiv = document.getElementById('djurInnehall');
            innehallDiv.innerHTML = `
                <div class="djur-layout">
                    <div class="djur-info">
                        <h2 style="color:#4ade80; margin-top:0; font-size: 1.8rem;">${djur.namn}</h2>
                        
                        <div class="fakta-punkt">
                            <strong>🏠 Var de lever / bor</strong>
                            ${djur.bor}
                        </div>
                        <div class="fakta-punkt">
                            <strong>🥩 Vad de äter</strong>
                            ${djur.ater}
                        </div>
                        
                        <h3>Biologi & Livsstil</h3>
                        <p class="info-text">${djur.fakta}</p>
                        
                        ${wikiLänk ? `<p style="margin-top:20px;"><a href="${wikiLänk}" target="_blank" style="color:#4ade80; font-weight:bold; text-decoration:none;">Öppna fullständigt forskningsarkiv ➔</a></p>` : ''}
                    </div>
                    <div class="djur-bild-box">
                        <img src="${djur.bild}" alt="${djur.namn}" onerror="this.src='https://unsplash.com'">
                    </div>
                </div>
            `;
        }

        window.onload = () => visaInbyggtDjur('blåval');
    </script>

</body>
</html>
