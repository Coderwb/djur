<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Världens Alla Djur</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f7f4;
            color: #2c3e50;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 650px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
        }
        h1 {
            color: #1e4620;
            margin-top: 0;
        }
        .sok-lada {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        input {
            padding: 12px;
            width: 65%;
            border: 2px solid #2e7d32;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #1b5e20;
        }
        #resultat {
            margin-top: 30px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 15px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .felmeddelande {
            color: #c0392b;
            background-color: #fdedec;
            padding: 15px;
            border-radius: 6px;
            border-left: 5px solid #e74c3c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🦁 Världens Alla Djur 🌍</h1>
        <p>Skriv ett djur på svenska (t.ex. blåval, fästing, schimpans, guldfisk):</p>
        
        <div class="sok-lada">
            <input type="text" id="djurInmatning" placeholder="Skriv ett djurnamn...">
            <button onclick="sokDjur()">Sök djur</button>
        </div>

        <div id="resultat"></div>
    </div>

    <script>
        // Gör det möjligt att trycka på 'Enter' i fältet för att söka
        document.getElementById('djurInmatning').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sokDjur();
            }
        });

        async function sokDjur() {
            const inputFalt = document.getElementById('djurInmatning');
            const resultatDiv = document.getElementById('resultat');
            
            // Gör om texten så att första bokstaven alltid är stor och resten små (t.ex. "Blåval")
            let sökord = inputFalt.value.trim();
            if (!sökord) {
                resultatDiv.innerHTML = '<p class="felmeddelande">Vänligen skriv in ett djurnamn först.</p>';
                return;
            }
            
            sökord = sökord.charAt(0).toUpperCase() + sökord.slice(1).toLowerCase();

            resultatDiv.innerHTML = '<p style="color: #7f8c8d;">Söker i djurdatabasen...</p>';

            try {
                // Nu anropar vi SVENSKA wikipedia (.sv istället för .en)
                const url = `https://wikipedia.org{encodeURIComponent(sökord)}`;
                const svar = await fetch(url);
                
                if (!svar.ok) {
                    throw new Error(`Kunde inte hitta "${sökord}". Kontrollera stavningen eller prova ett annat djur.`);
                }

                const data = await svar.json();

                // Bygger upp sidan med den funna informationen
                let htmlInnehall = `<h2 style="color:#2e7d32; margin-bottom:5px;">${data.title}</h2>`;
                
                if (data.thumbnail) {
                    htmlInnehall += `<img src="${data.thumbnail.source}" alt="${data.title}">`;
                }
                
                htmlInnehall += `<p style="line-height: 1.6; font-size: 16px;">${data.extract}</p>`;
                htmlInnehall += `<p style="margin-top:20px;"><a href="${data.content_urls.desktop.page}" target="_blank" style="color:#2e7d32; font-weight:bold; text-decoration:none;">Läs hela artikeln på Wikipedia ➔</a></p>`;

                resultatDiv.innerHTML = htmlInnehall;

            } catch (fel) {
                resultatDiv.innerHTML = `<p class="felmeddelande">${fel.message}</p>`;
            }
        }
    </script>

</body>
</html>
